name: Release Build

# Triggers only after CI passes on main, so broken builds are never released
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # Skip if CI failed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: MysticSiege-linux
            binary_src: dist/MysticSiege
            binary_dst: dist/MysticSiege-linux
            add_data: "assets:assets"
          - os: windows-latest
            artifact_name: MysticSiege-windows.exe
            binary_src: dist/MysticSiege.exe
            binary_dst: dist/MysticSiege-windows.exe
            add_data: "assets;assets"
    runs-on: ${{ matrix.os }}

    steps:
      # Check out the exact commit that CI tested
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Generate placeholder PNGs so assets/ is never empty in the bundle
      - name: Generate placeholder assets
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python src/utils/placeholder_assets.py

      - name: Build with PyInstaller
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: >
          pyinstaller
          --onefile
          --windowed
          --name MysticSiege
          --add-data "${{ matrix.add_data }}"
          main.py

      - name: Rename binary to include platform
        shell: bash
        run: mv "${{ matrix.binary_src }}" "${{ matrix.binary_dst }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_dst }}
          retention-days: 1

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute version
        run: |
          MAJOR_MINOR=$(cat version.txt | tr -d '[:space:]')
          # Find the commit where version.txt was last changed, then count
          # all commits made after it — this resets to 0 on every version bump
          SINCE=$(git log --format="%H" -- version.txt | head -1)
          if [ -z "$SINCE" ]; then
            PATCH=$(git rev-list --count HEAD)
          else
            PATCH=$(git rev-list --count ${SINCE}..HEAD)
          fi
          echo "VERSION=${MAJOR_MINOR}.${PATCH}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            **To play on Linux:** `chmod +x MysticSiege-linux && ./MysticSiege-linux`
            **To play on Windows:** double-click `MysticSiege-windows.exe`
          files: |
            artifacts/MysticSiege-linux/MysticSiege-linux
            artifacts/MysticSiege-windows.exe/MysticSiege-windows.exe
